name: Wine Quality Preprocessing

on:
  push:
    paths:
      - 'wine-quality-white_raw.csv'
      - 'preprocessing/automate_Devani.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 numpy==2.2.6
      
      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_Devani.py
        working-directory: ${{ github.workspace }}
      
      - name: Upload preprocessing artifact
        uses: actions/upload-artifact@v5
        with:
          name: wine-quality-white_preprocessing
          path: preprocessing/wine-quality-white_preprocessing.csv
          retention-days: 30
      
      - name: Commit processed dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f preprocessing/wine-quality-white_preprocessing.csv ]; then
            git add preprocessing/wine-quality-white_preprocessing.csv
            
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update preprocessed dataset [skip ci]"
              git push
            fi
          else
            echo "Preprocessed file not found!"
            exit 1
          fi
